version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d

  api:
    build: .
    container_name: node-api
    depends_on:
      - db
    ports:
      - '3000:3000'
    command: npm run start
    environment:
      DB_HOST: postgres-db
    env_file:
      - .env
volumes:
  pgdata: